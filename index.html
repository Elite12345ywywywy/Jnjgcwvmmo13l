<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALL GAME 1Min</title>

<style>
body {
    font-family: 'Arial', sans-serif;
    background-color: #333;
    margin: 0;
    padding: 0;
    color: #fff;
}

h1, h2 {
    color: #ffc107; /* yellow */
    text-align: center;
    margin-top: 20px;
}

.card {
    max-width: 90%;
    margin: 20px auto;
    padding: 20px;
    border-radius: 8px;
    background-color: #444;
    box-shadow: 3 4px 8px rgba(0, 0, 0, 0.1);
}

#dataTable, #predictionHistoryTable {
    width: 100%;
    border-radius: 8px;
    overflow: hidden;
    background-color: #555;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #666;
}

th {
    background-color: #ffc107; /* yellow */
    color: black;
    font-weight: bold;
}

td {
    background-color: #666;
}

tr:nth-child(even) td {
    background-color: #777;
}

tr:hover td {
    background-color: #888;
}

#predictionChart {
    width: 100%;
    height: 250px;
    border: 2px solid #ffc107; /* yellow */
    border-radius: 8px;
    background-color: #555;
}

.pagination {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

.pagination button {
    padding: 10px 20px;
    margin: 0 5px;
    border: none;
    border-radius: 5px;
    background-color: #ffc107; /* yellow */
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

.pagination button:hover {
    background-color: #e6b800;
    transform: scale(1.05);
}

.pagination button:disabled {
    background-color: #cccccc;
}

#timeRemaining {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
}

#predictedNumber, #predictedPremium {
    font-size: 18px;
    text-align: center;
    margin: 10px 0;
}

.button-group {
    display: flex;
    justify-content: center;
    margin: 20px 0;
}

.button-group a {
    padding: 10px 20px;
    margin: 0 10px;
    border-radius: 5px;
    text-decoration: none;
    color: black;
    display: inline-block;
    transition: 0.3s;
}

#registerButton {
    background-color: #ffc107; /* yellow */
}

#telegramButton {
    background-color: #dc3545;
    color: white;
}

.button-group a:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<h1>13L Game Hack</h1>

<div class="card">
    <h2>Live Prediction</h2>
    <p id="predictedNumber">Prediction :--</p>
    <p id="predictedPremium">Enjoy: --</p>
</div>

<div class="card">
    <h2>Timer</h2>
    <p id="timeRemaining">--:--</p>

    <div class="button-group">
        <a href="#" id="registerButton">Register</a>
        <a href="#" id="telegramButton">Telegram</a>
    </div>
</div>

<div class="card">
    <h2>Latest Data</h2>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Issue Number</th>
                <th>Number</th>
                <th>Colour</th>
                <th>Premium</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="card">
    <h2>Prediction History</h2>
    <table id="predictionHistoryTable">
        <thead>
            <tr>
                <th>Issue Number</th>
                <th>Predicted</th>
                <th>Actual</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="pagination">
        <button id="prevPage">Previous</button>
        <button id="nextPage">Next</button>
    </div>
</div>

<script>
// Simple demo script (your original logic unchanged idea)
document.getElementById("predictedNumber").innerText = "Prediction: 7 (Big)";
document.getElementById("predictedPremium").innerText = "Enjoy: N/A";

let time = 60;
setInterval(() => {
    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timeRemaining").innerText =
        `Time Remaining: ${min}:${sec < 10 ? '0' : ''}${sec}`;
    time--;
    if (time < 0) time = 60;
}, 1000);
</script>

</body>
</html>
